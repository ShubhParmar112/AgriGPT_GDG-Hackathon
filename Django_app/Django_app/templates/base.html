{% load static cache_bust %}
<!DOCTYPE html>
<html lang="{{ CURRENT_LANG }}" data-lang="{{ CURRENT_LANG }}" class="{% if user.is_authenticated and user.profile.theme == 'dark' %}dark{% endif %}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>{% block title %}AgriGPT{% endblock %}</title>
<meta name="theme-color" content="#2E7D32">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          'deep-green': '#2E7D32',
          'deep-green-dark': '#1B5E20',
          'light-green': '#A5D6A7',
          'soft-beige': '#FFF8E7',
        },
        fontFamily: {
          sans: ['Poppins', 'sans-serif'],
        },
        borderRadius: {
          '2xl': '1.25rem',
          '3xl': '1.75rem',
        },
        boxShadow: {
          soft: '0 10px 30px -10px rgba(46, 125, 50, 0.18)',
          card: '0 6px 20px -6px rgba(46, 125, 50, 0.15)',
        },
      },
    },
  };
</script>

<link rel="stylesheet" href="{% cbstatic 'css/style.css' %}">
{% block extra_head %}{% endblock %}
</head>
<body class="bg-soft-beige dark:bg-slate-900 font-sans text-gray-800 dark:text-gray-100 antialiased min-h-screen flex flex-col transition-colors duration-300">
{% csrf_token %}

{% block body %}{% endblock %}

<script id="i18n-data" type="application/json">{{ I18N_JSON|safe }}</script>
<script id="geo-i18n-data" type="application/json">{{ GEO_JSON|safe }}</script>
<script src="{% cbstatic 'js/main.js' %}"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
